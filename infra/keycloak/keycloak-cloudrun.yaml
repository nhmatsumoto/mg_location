apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: sos-keycloak
  labels:
    cloudconfigs.gcp.solutions/runtime: cloudrun
spec:
  template:
    spec:
      containers:
      - image: quay.io/keycloak/keycloak:26.0
        args:
        - "start-dev"
        - "--proxy=edge"
        - "--hostname-strict=false"
        - "--http-relative-path=/auth"
        env:
        - name: KEYCLOAK_ADMIN
          value: admin
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: admin
        - name: KC_DB
          value: postgres
        - name: KC_DB_URL
          value: "jdbc:postgresql://<DB_IP>:5432/keycloak"
        - name: KC_DB_USERNAME
          value: keycloak_user
        - name: KC_DB_PASSWORD
          value: "keycloak_password"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: 2Gi
            cpu: 1000m
