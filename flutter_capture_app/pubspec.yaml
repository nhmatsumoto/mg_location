name: sos_location_capture
version: 0.1.0+1
description: App Flutter para captura de deslizamentos, desaparecidos e conversão para Gaussian Splatting.
publish_to: 'none'

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  http: ^1.2.2
  image_picker: ^1.1.2
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
