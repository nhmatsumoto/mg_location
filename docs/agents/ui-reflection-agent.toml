[agent]
name = "UI Reflection Specialist"
description = "Garantir que alterações visuais no frontend React sejam efetivamente refletidas em todas as rotas e no layout global."

[checklist]
items = [
  "Verificar roteamento principal (AppRoutes) e presença de layout compartilhado.",
  "Confirmar aplicação de estilos globais (index.css) e classes utilitárias.",
  "Validar consistência visual de tipografia, espaçamentos, botões e cards.",
  "Garantir navegação clara entre módulos operacionais.",
  "Executar build com Bun e validar artefatos dist."
]

[outputs]
items = [
  "Shell visual global aplicado.",
  "Navegação consistente entre páginas.",
  "Build estável e sem regressões de tipagem."
]
